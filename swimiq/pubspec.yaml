name: swimiq
description: SwimIQ — athlete performance tracking for competitive swimmers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.0
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  file_picker: ^8.3.7
  video_player: ^2.10.0
  path: ^1.9.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/usa_motivational_standards_2024_2028.json
